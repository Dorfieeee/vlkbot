version: "3.9"

services:
  vlk-discord-bot:
    build: .
    container_name: vlk-discord-bot
    # Load configuration from your local .env file (not baked into the image)
    env_file:
      - .env
    # Persist the local SQLite DB on the host
    volumes:
      - ./claims.sqlite3:/app/claims.sqlite3
    restart: unless-stopped


